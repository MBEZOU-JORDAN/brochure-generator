<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrochureAI Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── GRAIN OVERLAY ───────────────────────────────────── -->
  <div class="grain" aria-hidden="true"></div>

  <!-- ── HEADER ──────────────────────────────────────────── -->
  <header class="site-header">
    <div class="logo">
      <span class="logo-mark">B</span>
      <span class="logo-text">BrochureAI <em>Pro</em></span>
    </div>
    <div class="header-meta">
      <span class="badge">Llama 3.3 · FLUX.1 · edge-tts</span>
    </div>
  </header>

  <!-- ── MAIN LAYOUT ─────────────────────────────────────── -->
  <main class="layout">

    <!-- ════ PANNEAU GAUCHE — Inputs ════ -->
    <aside class="panel panel-left">

      <div class="panel-section">
        <label class="field-label">Nom de l'entreprise</label>
        <input
          id="company-name"
          class="field-input"
          type="text"
          placeholder="Ex: Anthropic, Orange, SUNU Group…"
          autocomplete="off"
        />
      </div>

      <div class="panel-section">
        <label class="field-label">
          URL du site
          <span class="field-hint">optionnel — on cherche si absent</span>
        </label>
        <div class="url-field-wrap">
          <input
            id="company-url"
            class="field-input"
            type="text"
            placeholder="https://example.com"
            autocomplete="off"
          />
          <button id="search-btn" class="icon-btn" title="Rechercher l'URL" aria-label="Rechercher">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
          </button>
        </div>

        <!-- Suggestions de recherche -->
        <div id="search-results" class="search-dropdown hidden" role="listbox"></div>
      </div>

      <!-- Style flyer -->
      <div class="panel-section">
        <label class="field-label">Style du flyer</label>
        <div class="style-grid">
          <button class="style-chip active" data-style="modern">Modern</button>
          <button class="style-chip" data-style="elegant">Elegant</button>
          <button class="style-chip" data-style="bold">Bold</button>
          <button class="style-chip" data-style="minimal">Minimal</button>
        </div>
      </div>

      <!-- Langue TTS -->
      <div class="panel-section">
        <label class="field-label">Langue de la synthèse vocale</label>
        <div class="style-grid">
          <button class="style-chip active" data-lang="fr">🇫🇷 Français</button>
          <button class="style-chip" data-lang="en">🇬🇧 English</button>
        </div>
      </div>

      <!-- CTA principal -->
      <button id="generate-btn" class="btn-primary" disabled>
        <span class="btn-text">Générer la brochure</span>
        <svg class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
        </svg>
      </button>

      <!-- Status pipeline -->
      <div id="status-bar" class="status-bar hidden">
        <div class="status-spinner"></div>
        <span id="status-text">En cours…</span>
      </div>

    </aside>

    <!-- ════ PANNEAU DROIT — Outputs ════ -->
    <section class="panel panel-right">

      <!-- État vide -->
      <div id="empty-state" class="empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" opacity="0.3">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
        </div>
        <p class="empty-title">Votre brochure apparaîtra ici</p>
        <p class="empty-sub">Renseignez le nom d'une entreprise et lancez la génération</p>
      </div>

      <!-- Zone brochure (cachée jusqu'à la génération) -->
      <div id="brochure-container" class="brochure-container hidden">

        <!-- Toolbar actions -->
        <div class="brochure-toolbar">
          <div class="toolbar-left">
            <span id="brochure-company-name" class="brochure-company-badge"></span>
            <span id="source-url" class="source-url-badge"></span>
          </div>
          <div class="toolbar-right">
            <button id="copy-btn" class="tool-btn" title="Copier le markdown">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
              Copier
            </button>
            <button id="tts-btn" class="tool-btn" title="Écouter la brochure">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
              Écouter
            </button>
            <button id="flyer-btn" class="tool-btn tool-btn-accent" title="Générer un flyer">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              Flyer
            </button>
          </div>
        </div>

        <!-- Contenu brochure rendu en HTML -->
        <div id="brochure-content" class="brochure-content">
          <div id="brochure-render" class="brochure-render"></div>
          <span id="cursor" class="typing-cursor"></span>
        </div>

        <!-- Player TTS (caché jusqu'au chargement audio) -->
        <div id="tts-player" class="tts-player hidden">
          <div class="player-info">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            <span id="tts-voice-label" class="player-voice">Chargement audio…</span>
          </div>
          <audio id="audio-player" controls></audio>
        </div>

      </div>

      <!-- Zone flyer (s'ajoute sous la brochure) -->
      <div id="flyer-container" class="flyer-container hidden">
        <div class="flyer-header">
          <h3 class="flyer-title">Flyer généré</h3>
          <button id="download-flyer-btn" class="tool-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Télécharger
          </button>
        </div>
        <div id="flyer-loading" class="flyer-loading hidden">
          <div class="flyer-spinner"></div>
          <span>Génération FLUX.1-schnell…</span>
        </div>
        <img id="flyer-image" class="flyer-image hidden" alt="Flyer généré" />
        <div id="flyer-prompt" class="flyer-prompt hidden"></div>
      </div>

    </section>

  </main>

  <!-- ── marked.js pour rendre le markdown ───────────────── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
